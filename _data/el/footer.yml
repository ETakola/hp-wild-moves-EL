# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:
  - name: Σχετικά
    description: >
      Αυτός ο ιστότοπος συντηρείται από την ομάδα WILDLABS και
      εθελοντές της κοινότητας παρακολούθησης ζώων.
      [Σχετικά με αυτόν τον ιστότοπο](/el/about).
  - name: Κώδικας
    description: >
      Αυτός ο ιστότοπος είναι ανοιχτού κώδικα.
      Έχετε κάποια πρόταση ή εντοπίσατε κάποιο τυπογραφικό λάθος;
      Δημιουργήστε ένα issue στο [GitHub](https://github.com/gbif/hp-wild-moves/issues).
  - name: Επικοινωνία
    connectIcons: true

